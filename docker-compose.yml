# ZEN70 容器编排 - 由 scripts/compiler.py 生成
# 法典 1.2：网络平面隔离 frontend_net / backend_net

services:
  caddy:
    image: caddy:2-alpine@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
    container_name: zen70-caddy
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://127.0.0.1:2019/config/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
    - ./frontend/dist:/var/www/html:ro
    - caddy_data:/data
    - caddy_config:/config
    environment:
    - MACHINE_API_ALLOWLIST=${MACHINE_API_ALLOWLIST:-private_ranges}
    - MACHINE_API_INTERNAL_HOST=${MACHINE_API_INTERNAL_HOST:-caddy}
    ports:
    - 80:80
    - 443:443
    networks:
    - frontend_net
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  postgres:
    image: pgvector/pgvector:pg15@sha256:7f5681e45237acdf546cf7cdc0dfc0ed7752ede857fda6e54f6ea21b936f8742
    container_name: zen70-postgres
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-zen70} || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
    - postgres_data:/var/lib/postgresql/data
    environment:
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=${POSTGRES_DB}
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: zen70-redis
    restart: unless-stopped
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    oom_score_adj: -999
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - redis_data:/data
    - ${REDIS_ACL_FILE}:/etc/redis/users.acl:ro
    command:
    - redis-server
    - --appendonly
    - 'yes'
    - --maxmemory
    - 800mb
    - --maxmemory-policy
    - volatile-lru
    - --aclfile
    - /etc/redis/users.acl
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  nats:
    image: nats:2.12.5-alpine@sha256:f550232ddb35ba6a2ab2eecca2ec07f4c07bbfc330d52615805129984b75dd4a
    container_name: zen70-nats
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://127.0.0.1:8222/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - nats_data:/data
    command:
    - --jetstream
    - --store_dir
    - /data
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: gateway-kernel
    image: ${ZEN70_GATEWAY_IMAGE_REF:-zen70-gateway:v3.43}
    container_name: zen70-gateway
    restart: unless-stopped
    stop_grace_period: 15s
    user: ${PUID:-1000}:${PGID:-1000}
    read_only: true
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    oom_score_adj: -999
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health',
        timeout=5)" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_USER=${REDIS_USER}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - AI_BACKEND_URL=${AI_BACKEND_URL}
    - GATEWAY_PROFILE=${GATEWAY_PROFILE}
    - GATEWAY_PACKS=${GATEWAY_PACKS}
    - POSTGRES_DSN=${POSTGRES_DSN}
    - EVENT_BUS_BACKEND=nats
    - NATS_URL=nats://nats:4222
    - NATS_CONNECT_TIMEOUT=5.0
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
      update_config:
        order: start-first

  runner-agent:
    build:
      context: .
      dockerfile: runner-agent/Dockerfile
    image: ${ZEN70_RUNNER_AGENT_IMAGE_REF:-zen70-runner-agent:v3.43}
    container_name: zen70-runner-agent
    restart: unless-stopped
    stop_grace_period: 10s
    user: ${PUID:-1000}:${PGID:-1000}
    read_only: true
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE
    healthcheck:
      test:
      - CMD-SHELL
      - cat /proc/1/comm | grep -q runner-agent || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - caddy_data:/caddy-data:ro
    environment:
    - GATEWAY_BASE_URL=https://${MACHINE_API_INTERNAL_HOST:-caddy}
    - GATEWAY_CA_FILE=/caddy-data/caddy/pki/authorities/local/root.crt
    - RUNNER_NODE_NAME=zen70-go-runner
    - RUNNER_PROFILE=go-runner
    - RUNNER_CAPABILITIES=connector.invoke
    - RUNNER_HEARTBEAT_SECONDS=15
    - RUNNER_PULL_SECONDS=5
    - RUNNER_LEASE_SECONDS=30
    depends_on:
      gateway:
        condition: service_healthy
      caddy:
        condition: service_healthy
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  sentinel:
    image: ${ZEN70_GATEWAY_IMAGE_REF:-zen70-gateway:v3.43}
    container_name: zen70-sentinel
    restart: unless-stopped
    stop_grace_period: 15s
    oom_score_adj: -999
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import pathlib; assert 'control_plane_supervisor' in pathlib.Path('/proc/1/cmdline').read_text()"
        || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
    - ./backend:/app/backend:ro
    - ./scripts:/app/scripts:ro
    - ./iac:/app/iac:ro
    - ./system.yaml:/app/system.yaml:ro
    - ./config:/app/config:ro
    - ./runtime/control-plane:/app/runtime/control-plane
    - /dev:/dev:ro
    - /sys:/sys:ro
    environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_USER=${REDIS_USER}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
    - BIT_ROT_CPU_LOAD_THRESHOLD_PERCENT=${BIT_ROT_CPU_LOAD_THRESHOLD_PERCENT:-50}
    - BIT_ROT_ALERT_TIMEOUT_SECONDS=${BIT_ROT_ALERT_TIMEOUT_SECONDS:-5}
    - BIT_ROT_SQLITE_CONNECT_TIMEOUT_SECONDS=${BIT_ROT_SQLITE_CONNECT_TIMEOUT_SECONDS:-5}
    - BIT_ROT_SQLITE_BUSY_TIMEOUT_MS=${BIT_ROT_SQLITE_BUSY_TIMEOUT_MS:-5000}
    - BITROT_SCAN_DIRS=${BITROT_SCAN_DIRS}
    - MOUNT_POINTS=${MOUNT_POINTS}
    - SWITCH_CONTAINER_MAP=${SWITCH_CONTAINER_MAP_JSON}
    - SWITCH_SERVICE_PORTS=${SWITCH_SERVICE_PORTS}
    - ROUTING_STATE_FILE=/app/runtime/control-plane/routes.json
    - CADDY_ADMIN_URL=http://caddy:2019/load
    - DOCKER_HOST=tcp://docker-proxy:2375
    command:
    - python
    - backend/sentinel/control_plane_supervisor.py
    depends_on:
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  docker-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE_REF:-tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476}
    container_name: zen70-docker-proxy
    restart: unless-stopped
    stop_grace_period: 10s
    oom_score_adj: -999
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://127.0.0.1:2375/version || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
    - CONTAINERS=1
    - SERVICES=1
    - TASKS=1
    - NETWORKS=1
    - NODES=1
    - POST=1
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M


networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  caddy_config: {}
  caddy_data: {}
  nats_data: {}
  postgres_data: {}
  redis_data: {}

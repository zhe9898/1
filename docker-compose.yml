# ZEN70 容器编排 - 由 scripts/compiler.py 生成
# 法典 1.2：网络平面隔离 frontend_net / backend_net

services:
  caddy:
    image: caddy:2-alpine@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa
    container_name: zen70-caddy
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://127.0.0.1:2019/config/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
    - ./frontend/dist:/var/www/html:ro
    - caddy_data:/data
    - caddy_config:/config
    environment:
    - MACHINE_API_ALLOWLIST=${MACHINE_API_ALLOWLIST:-private_ranges}
    - MACHINE_API_INTERNAL_HOST=${MACHINE_API_INTERNAL_HOST:-caddy}
    - GATEWAY_UPSTREAM=${GATEWAY_UPSTREAM}
    ports:
    - 80:80
    - 443:443
    - 127.0.0.1:2019:2019
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - frontend_net
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  postgres:
    image: pgvector/pgvector:pg15@sha256:7f5681e45237acdf546cf7cdc0dfc0ed7752ede857fda6e54f6ea21b936f8742
    container_name: zen70-postgres
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-zen70} || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
    - postgres_data:/var/lib/postgresql/data
    environment:
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=${POSTGRES_DB}
    ports:
    - 127.0.0.1:5432:5432
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: zen70-redis
    restart: unless-stopped
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    oom_score_adj: -999
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - redis_data:/data
    - ${REDIS_ACL_FILE}:/etc/redis/users.acl:ro
    command:
    - redis-server
    - --appendonly
    - 'yes'
    - --maxmemory
    - 800mb
    - --maxmemory-policy
    - volatile-lru
    - --aclfile
    - /etc/redis/users.acl
    ports:
    - 127.0.0.1:6379:6379
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  nats:
    image: nats:2.12.5-alpine@sha256:f550232ddb35ba6a2ab2eecca2ec07f4c07bbfc330d52615805129984b75dd4a
    container_name: zen70-nats
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://127.0.0.1:8222/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - nats_data:/data
    command:
    - --jetstream
    - --http_port
    - '8222'
    - --store_dir
    - /data
    ports:
    - 127.0.0.1:4222:4222
    networks:
    - backend_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M


networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  caddy_config: {}
  caddy_data: {}
  nats_data: {}
  postgres_data: {}
  redis_data: {}

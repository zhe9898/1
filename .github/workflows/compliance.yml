name: Compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BACKEND_MIN_COVERAGE: "70"

jobs:
  backend-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install pip==26.0.1
          python -m pip install --require-hashes -r backend/requirements-ci.lock

      - name: Shared backend quality gate
        run: python scripts/quality_gate.py backend-ci

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compliance-backend-artifacts
          path: |
            backend/coverage-backend.xml
            backend/bandit-report.json

  frontend-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Shared frontend quality gate
        run: python scripts/quality_gate.py frontend-ci

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compliance-coverage
          path: |
            frontend/coverage/lcov.info
            frontend/coverage/cobertura-coverage.xml

# 法典 5.2.1 / 5.2.2：CI 门禁 — 依赖与代码规范、单元测试
# 合并前需通过：backend 单元测试 + black/isort/flake8（与 .pre-commit-config.yaml 一致）
name: Compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BACKEND_MIN_COVERAGE: "60"

jobs:
  backend-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install pip==26.0.1
          python -m pip install --require-hashes -r backend/requirements-ci.lock

      - name: IaC single source of truth (deterministic compile)
        run: |
          python scripts/compiler.py system.yaml -o .
          git diff --exit-code -- docker-compose.yml .env config/Caddyfile

      - name: Black
        run: black --check --line-length 160 backend/
      - name: isort
        run: isort --check-only --profile black --line-length 160 backend/
      - name: Flake8
        run: flake8 --max-line-length=160 --extend-ignore=E203,W503 backend/

      - name: Mypy (strict, typed defs only)
        run: mypy --config-file backend/mypy.ini backend/api backend/core backend/models backend/workers backend/capabilities.py backend/background_tasks.py

      - name: Unit tests + coverage gate
        run: |
          python -m pytest backend/tests/unit/ -v --tb=short -q \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:backend/coverage-unit.xml \
            --cov-fail-under=${{ env.BACKEND_MIN_COVERAGE }}
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: SRE compliance (I/O timeout, no shell=True)
        run: python -m pytest tests/test_compliance_sre.py tests/test_repo_hardening.py -v --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Contract test (capabilities schema)
        run: python -m pytest backend/tests/unit/test_contract_capabilities.py -v --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Export OpenAPI contracts (must be in sync)
        run: |
          python scripts/generate_contracts.py
          git diff --exit-code -- contracts/metadata.json contracts/openapi docs/openapi-kernel.json docs/openapi-iot.json docs/openapi-ops.json docs/openapi-full.json docs/openapi.json
        env:
          PYTHONPATH: ${{ github.workspace }}
          DOMAIN: "localhost"

      - name: pip-audit (security)
        run: pip-audit -r backend/requirements-core.txt --strict --desc on

  frontend-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and audit (frontend)
        run: |
          cd frontend && npm ci
          npm audit --audit-level=high

      - name: Frontend typecheck + lint (no any)
        run: |
          cd frontend
          npm run lint

      - name: Frontend unit tests + coverage
        run: |
          cd frontend
          npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compliance-coverage
          path: |
            backend/coverage-unit.xml
            frontend/coverage/lcov.info
            frontend/coverage/cobertura-coverage.xml

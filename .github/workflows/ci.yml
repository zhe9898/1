name: ZEN70 CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  BACKEND_MIN_COVERAGE: "70"

jobs:
  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install pip==26.0.1
          python -m pip install --require-hashes -r requirements-ci.lock

      - name: Shared backend quality gate
        working-directory: ${{ github.workspace }}
        run: python scripts/quality_gate.py backend-ci

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bandit-report
          path: backend/bandit-report.json

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-coverage
          path: backend/coverage-backend.xml

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Shared frontend quality gate
        working-directory: ${{ github.workspace }}
        run: python scripts/quality_gate.py frontend-ci

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/lcov.info
            frontend/coverage/cobertura-coverage.xml

  runner-agent:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: runner-agent

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: "1.22"
          cache-dependency-path: runner-agent/go.sum

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -v -race -count=1 ./...

  placement-parity:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: "1.24.13"
          cache-dependency-path: placement-solver/go.sum

      - name: Install backend dependencies
        run: |
          python -m pip install pip==26.0.1
          python -m pip install --require-hashes -r backend/requirements-ci.lock

      - name: Go test placement solver
        working-directory: placement-solver
        run: go test -v ./...

      - name: Cross-language placement parity
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/test_placement_language_parity.py -q

  trivy:
    runs-on: ubuntu-24.04
    needs: [backend, runner-agent]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514

      - name: Build gateway image
        run: docker build -t zen70-gateway:ci -f backend/Dockerfile .

      - name: Scan gateway image
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            zen70-gateway:ci

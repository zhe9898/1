# ZEN70 项目统一格式化配置
# @generated by ZEN70-AI-Agent
# @architecture-version: V2.0
# @compliance: strict-sre-ruleset
#
# ⚠️ 行宽红线：全链路统一 160（pyproject / pre-commit / ci.yml / compliance.yml）
#    修改此值必须同步更新上述四处，否则 CI black --check 将与 pre-commit 冲突。

[tool.black]
line-length = 160
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 160

[tool.ruff]
line-length = 160
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "BLE",  # flake8-blind-except
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "T20",  # flake8-print (禁止 print 语句)
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",  # 行宽由 formatter 保障，linter 不重复检查
]

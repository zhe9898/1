[pytest]
asyncio_mode = auto
markers =
    unit: 单元测试（PR 门禁，快速）
    contract: 契约/schema 测试（PR 门禁，防前后端漂移）
    compliance: SRE 合规静态扫描（PR 门禁）
    integration: 集成测试（Nightly，需 Docker）
    e2e: 端到端测试（Nightly，需 Playwright）
    chaos: 混沌测试（Release，断网/杀容器）
    performance: 性能测试（Release，需 Locust）
testpaths =
    backend/tests/unit
    tests

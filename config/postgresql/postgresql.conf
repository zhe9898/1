# ZEN70 PostgreSQL WAL 归档配置
# 法典 §3.7：WAL 归档实现 PITR (Point-In-Time Recovery)
#
# 使用方式：
# 1. 将此文件挂载到 PostgreSQL 容器: -v ./config/postgresql/postgresql.conf:/etc/postgresql/zen70.conf:ro
# 2. 在 docker-compose postgres 服务中添加: command: ['postgres', '-c', 'config_file=/etc/postgresql/zen70.conf']
# 3. 创建归档目录: mkdir -p /var/lib/postgresql/wal_archive && chown 999:999 /var/lib/postgresql/wal_archive
# 4. 在 docker-compose 中添加卷: - wal_archive:/var/lib/postgresql/wal_archive
#
# PITR 恢复步骤：
# 1. 停止 PostgreSQL 容器
# 2. 恢复基础备份 (Restic restore)
# 3. 创建 recovery.signal 文件
# 4. 配置 restore_command 指向归档目录
# 5. 启动 PostgreSQL，它将自动重放 WAL 到指定时间点

# --- 基础设置 ---
listen_addresses = '*'
max_connections = 100
shared_buffers = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB

# --- WAL 配置 ---
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300

# --- 检查点优化 ---
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# --- 恢复配置（用于 PITR 恢复时） ---
# 取消注释以下行并设置目标时间：
# restore_command = 'cp /var/lib/postgresql/wal_archive/%f %p'
# recovery_target_time = '2026-03-19 12:00:00+00'
# recovery_target_action = 'promote'

# --- Autovacuum 配置（法典 §3.7 应用级 GC） ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# --- 日志 ---
log_timezone = 'UTC'
timezone = 'UTC'
log_statement = 'ddl'
log_min_duration_statement = 500
log_checkpoints = on
log_lock_waits = on

# ZEN70 MQTT 物联总线配置 (法典 §4.1.4)
# 仅允许 backend_net 内部访问，不对公网暴露
# P0-3: 禁用匿名访问，强制密码认证

listener 1883
allow_anonymous false
password_file /mosquitto/config/mosquitto_passwd

# TODO: Enable TLS for production deployments.
# Uncomment and configure the following for TLS (port 8883):
#   listener 8883
#   cafile /mosquitto/certs/ca.crt
#   certfile /mosquitto/certs/server.crt
#   keyfile /mosquitto/certs/server.key
#   require_certificate false
# Then remove or comment out the plaintext listener 1883 above.

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_type error
log_type notice

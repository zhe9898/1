    severity: P2
    category: retry_budget_semantics
    path: backend/runtime/execution/job_lifecycle_service.py
    symbol: requeue_from_dead_letter
    failure_mode: reset_retry_count resets retry_count only, leaving attempt_count to continue blocking future automatic retries
    impact: operators can requeue a dead-letter job back to pending but still inherit an exhausted automatic retry budget
    confidence: medium
    recommended_fix: Either reset attempt_count together with retry_count or rename and document the API to reflect that only the visible retry counter is reset
    verification_hint: backend/control_plane/adapters/jobs/models.py:99-102; backend/runtime/execution/job_lifecycle_service.py:150-189; backend/runtime/execution/failure_taxonomy.py:188-200; backend/tests/unit/test_jobs_dlq.py:119-129
    resolution_note: Current implementation delegates dead-letter requeue to _reset_for_fresh_attempt(reset_retry_budget=True), which resets retry_count and attempt_count together.

    verified_by:
      - backend/tests/unit/test_jobs_runtime.py
      - runner-agent/internal/api/client_test.go
      - runner-agent/internal/jobs/poller_test.go
      - go test ./...
    severity: P1
    category: lease_and_concurrency
    path: runner-agent/internal/jobs/poller.go
    symbol: startLeaseRenewal/reportProgress/reportFailure/reportResult
    failure_mode: backend renew endpoint rotates lease_token but runner-agent keeps sending the stale token after renew succeeds
    impact: progress, success, or failure callbacks can be rejected as stale-owner callbacks, causing false lease expiry, duplicate requeue, or confusing operational state
    confidence: high
    recommended_fix: Parse JobLeaseResponse in runner-agent RenewLease, update the live lease token atomically, and add a cross-language regression that covers renew -> progress/result/fail
    verification_hint: backend/runtime/execution/lease_service.py:104-120; backend/control_plane/adapters/jobs/lifecycle.py:369-405; backend/tests/unit/test_jobs_runtime.py:267-294; runner-agent/internal/api/client.go:271-272; runner-agent/internal/jobs/poller.go:128-135,166-228
    resolution_note: RenewLease now returns the renewed lease payload and the poller atomically swaps the active token before subsequent progress, result, and fail callbacks.

  - finding_id: F-002
    status: fixed
    opened_at: 2026-04-07
    fixed_at: 2026-04-10
    verified_by:
      - backend/tests/unit/test_routes_sse.py
      - backend/tests/unit/test_control_plane_multitenant_constraints.py
      - frontend/src/utils/sse.ts
    severity: P1
    category: tenant_boundary
    path: backend/control_plane/adapters/routes.py
    symbol: _sse_event_generator/sse_events
    failure_mode: SSE subscribers attach to global Redis channels without tenant-scoped channels or payload filtering
    impact: authenticated clients in one tenant can observe node, job, connector, reservation, or trigger events emitted by another tenant
    confidence: high
    recommended_fix: Introduce tenant-scoped event channels or strict tenant filtering in the SSE loop, and require tenant_id in the event contract before frontend fan-out
    verification_hint: backend/platform/events/channels.py:1-140; backend/control_plane/adapters/routes.py:168-250; backend/control_plane/adapters/control_events.py:18-45; frontend/src/utils/sse.ts:163-190; frontend/src/composables/useAppRuntime.ts:68-83
    resolution_note: Tenant-scoped channels are now part of the realtime contract, publishers must attach tenant_id for scoped subjects, and the SSE loop filters scoped events before fan-out.


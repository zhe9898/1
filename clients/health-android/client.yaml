client_id: health-android
platform: android
runtime: native
delivery_stage: mvp-skeleton
pack_key: health-pack
auth_provider: gateway-identity
bootstrap_receipts: backend-owned
tenant_context: required
node_contract:
  required_env:
    - RUNNER_TENANT_ID
    - RUNNER_NODE_ID
    - NODE_TOKEN
    - GATEWAY_BASE_URL
    - GATEWAY_CA_FILE
capabilities:
  - health.ingest
selector_hints:
  - required_capabilities=health.ingest
  - target_zone=mobile
  - target_executor=kotlin-native
connectors:
  - health.android
notes:
  - Read Android Health Connect locally and upload through Gateway-controlled connectors and jobs.
  - Do not embed Health Connect libraries into the Python gateway default runtime.
